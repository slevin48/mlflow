      - id: "F011"
        heuristic: "flexibility_efficiency"
        severity: "major"
        description: "No download or export buttons for artifact files or run data."
        evidence: "Marcus: 'No obvious CSV export. Would have to use the REST API to get data out programmatically.'"
        recommendation: "Add download buttons on individual artifacts. Add 'Export Run as CSV/JSON' button on run detail page."
        affected_personas: ["Marcus Delgado", "Lena Kowalski"]

      - id: "F012"
        heuristic: "consistency_standards"
        severity: "major"
        description: "No Register Model button on run detail page. No clear path from logged model to model registry."
        evidence: "Marcus: 'There is no Register Model button visible on this page.'"
        recommendation: "Add a 'Register Model' action button next to the logged model entry on the run detail page."
        affected_personas: ["Marcus Delgado"]

    accessibility_findings: []

    jtbd_alignment:
      supported: false
      gap_description: "The JTBD was to compare runs for a promotion decision. Comparison was blocked by inability to expand child runs and only having 1 selectable parent. Marcus had to resort to mental assessment rather than tool-supported comparison. Export was only possible via API."
      minimum_path_length: 5
      actual_path_length: 8
      efficiency_ratio: 0.63

    complementarity_notes: |
      skore logged rich artifacts (HTML analysis, PNGs, CSV) that would support a promotion decision, but the MLflow UI lacks the comparison and export workflows to leverage them. The data quality is high but the presentation workflow is incomplete. Marcus's verdict: 'Enough data for preliminary assessment, but comparison and export workflow is severely lacking.'


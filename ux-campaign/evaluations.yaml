    wcag_failures:
      level_a: ["2.1.1 Keyboard (x4)", "2.4.1 Bypass Blocks (x1)", "2.4.3 Focus Order (x1)"]
      level_aa: ["2.4.7 Focus Visible (x2)"]

  complementarity_assessment: |
    The skore+MLflow+JupyterLab integration works well at the data layer: skore logs rich, structured data (metrics, parameters, tags, artifacts) into MLflow automatically. However, the presentation and navigation layers introduce significant friction:

    1. NO FEEDBACK LOOP: After project.put() in JupyterLab, there is no link or widget showing logged data. Users must manually navigate to MLflow in a separate tab.

    2. MENTAL MODEL MISMATCH: MLflow's UI is GenAI-first, showing observability dashboards by default. Classical ML users (the primary skore audience) hit empty pages before finding their data.

    3. COMPARISON GAP: skore logs per-fold CV data that would enable powerful comparison, but MLflow's UI has no fold comparison view. The rich data is trapped behind a limited presentation.

    4. ACCESSIBILITY WALL: Keyboard-only users are blocked at the ag-grid level in MLflow and the Launcher level in JupyterLab. The Python API works, but that defeats the purpose of a visual workflow.

    5. EXPORT DEAD-END: Data logged by skore cannot be easily exported from MLflow's UI (no download buttons), forcing users to the REST API or Python client.

    The three tools are loosely coupled rather than tightly integrated. Each works independently, but the transitions between them (notebook -> MLflow UI, MLflow UI -> artifact download, comparison across folds) are where the user experience breaks down.

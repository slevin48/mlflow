        evidence: "Marcus: 'No expand icon found in the ag-grid. Child runs are not expandable from the parent row.'"
        recommendation: "Add expand/collapse toggle on parent runs to show child runs inline. Add a 'Flatten' toggle to show all runs at the same level."

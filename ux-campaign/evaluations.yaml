evaluations:
  # ============================================================
  # FLOW A: Experiment Discovery (MLflow UI)
  # ============================================================

  - session_id: "priya_flowA"
    persona: "Priya Chandrasekaran"
    flow: "A"
    overall_score: 62
    outcome: "completed_with_difficulty"

    heuristic_scores:
      visibility_of_system_status:
        score: 2
        evidence: "Experiment overview shows empty observability charts ('No data available') instead of training runs — Priya had no indication of where her data was."
      match_system_real_world:
        score: 3
        evidence: "Landing page is GenAI-focused (Tracing, Evaluation, Prompts, AI Gateway). Jargon like 'artifact URI' and 'Run ID' confuses a novice who thinks in terms of spreadsheet rows."
      user_control_freedom:
        score: 1
        evidence: "Navigation between tabs and back to overview was straightforward once discovered."
      consistency_standards:
        score: 2
        evidence: "'6 matching runs' displayed but only 1 row visible. Child runs hidden with no expand affordance — inconsistent with the count."
      error_prevention:
        score: 1
        evidence: "No destructive actions encountered; however, no guidance prevents a novice from misinterpreting the empty overview as a bug."
      recognition_over_recall:
        score: 2
        evidence: "Must recall to click 'Training runs' in sidebar rather than being shown runs by default. No getting-started wizard."
      flexibility_efficiency:
        score: 1
        evidence: "Expert shortcuts not relevant for this novice; basic click-through path works but is longer than necessary."
      aesthetic_minimal:
        score: 2
        evidence: "Landing page has too many GenAI feature cards irrelevant to classical ML. Information overload before reaching experiments."
      error_recovery:
        score: 1
        evidence: "No errors encountered, but no recovery guidance for the 'empty overview' confusion."
      help_documentation:
        score: 3
        evidence: "No tooltips for jargon (artifact URI, Run ID, .pkl files). No inline help or getting-started wizard for first-time users."

    findings:
      - id: "F001"
        heuristic: "match_system_real_world"
        severity: "major"
        description: "Landing page is GenAI-focused; classical ML experiments are buried in 'Recent Experiments' at the bottom."
        evidence: "Priya: 'I expected something simpler, like a table of my experiments. Oh wait, at the bottom I see Recent Experiments!'"
        recommendation: "Detect experiment type and surface relevant content first. Add a toggle or auto-detect for ML Training vs GenAI workflows on the landing page."
        affected_personas: ["Priya Chandrasekaran", "Marcus Delgado", "David Okonkwo"]

      - id: "F002"
        heuristic: "visibility_of_system_status"
        severity: "major"
        description: "Experiment overview defaults to observability charts (traces, latency, errors) which are empty for classical ML experiments."
        evidence: "Priya: 'Umm, everything says No data available? Where are my runs?'"
        recommendation: "Auto-detect experiment type from tags (e.g., report_type=cross-validation) and default to Training Runs view for non-LLM experiments."
        affected_personas: ["Priya Chandrasekaran", "Marcus Delgado", "Lena Kowalski"]

      - id: "F003"
        heuristic: "consistency_standards"
        severity: "minor"
        description: "Footer shows '6 matching runs' but only 1 parent row is visible. No visual indicator for expandable child runs."
        evidence: "Priya: 'But I only see one row. Maybe the other 5 are the cross-validation folds?'"
        recommendation: "Add an expand/collapse chevron on parent runs. Show '1 parent + 5 child runs' instead of '6 matching runs'."
        affected_personas: ["Priya Chandrasekaran", "Marcus Delgado", "Lena Kowalski"]

      - id: "F004"
        heuristic: "help_documentation"
        severity: "minor"
        description: "MLflow jargon (artifact URI, Run ID, .pkl files) shown without tooltips or explanations."
        evidence: "Priya: 'What does artifact URI mean? I see a Run ID that is a long hex string... I would not know what to do with that.'"
        recommendation: "Add tooltips or info icons next to technical terms. Provide a glossary link in the sidebar."
        affected_personas: ["Priya Chandrasekaran"]

    accessibility_findings: []

    jtbd_alignment:
      supported: true
      gap_description: "The job was completed but the app's mental model (GenAI-first, observability-first) diverged from the persona's expectation of a simple experiment table. Required 3 extra navigation steps to reach training runs."
      minimum_path_length: 4
      actual_path_length: 8
      efficiency_ratio: 0.50

    complementarity_notes: |
      skore's automatic logging of metrics, parameters, and rich artifacts (confusion matrix, ROC, CSV) into MLflow is a strong value proposition. However, the MLflow UI does not surface skore-specific metadata prominently. Tags like report_type and ml_task are visible but not used to adapt the UI experience. The integration creates value at the data layer but friction at the presentation layer.

  - session_id: "marcus_flowA"
    persona: "Marcus Delgado"
    flow: "A"
    overall_score: 58
    outcome: "completed"

    heuristic_scores:
      visibility_of_system_status:
        score: 2
        evidence: "Empty observability charts on experiment overview; no metrics visible in runs table."
      match_system_real_world:
        score: 2
        evidence: "GenAI-first landing page does not match an MLOps engineer's mental model of a project-centric tracking tool. Compared unfavorably to W&B."
      user_control_freedom:
        score: 1
        evidence: "Navigation worked once the correct section was found."
      consistency_standards:
        score: 2
        evidence: "Runs table lacks metric columns that are standard in competing tools (W&B). '6 matching runs' vs 1 visible row."
      error_prevention:
        score: 1
        evidence: "No errors, but skore_version '0.0.0+unknown' is a reproducibility concern that should be flagged."
      recognition_over_recall:
        score: 2
        evidence: "Must recall to navigate to Training Runs. No metric columns in table require clicking into each run."
      flexibility_efficiency:
        score: 2
        evidence: "No keyboard shortcuts, no metric sorting in table, no parallel coordinates view. Expert workflow not supported."
      aesthetic_minimal:
        score: 2
        evidence: "Feature cards on landing page are noise for an expert who wants data immediately."
      error_recovery:
        score: 1
        evidence: "No errors encountered."
      help_documentation:
        score: 1
        evidence: "Expert did not need documentation but noted absence of inline help for team onboarding."

    findings:
      - id: "F005"
        heuristic: "flexibility_efficiency"
        severity: "major"
        description: "No metric columns in the runs table. Cannot sort or filter runs by metric values without clicking into each run."
        evidence: "Marcus: 'Where are my metrics? In W&B I would see metric columns right in the table.'"
        recommendation: "Add configurable metric columns to the training runs table with sort and filter capabilities."
        affected_personas: ["Marcus Delgado", "Lena Kowalski"]

      - id: "F006"
        heuristic: "flexibility_efficiency"
        severity: "minor"
        description: "Model metrics charts show single data points per chart — useless for a single-run CV display."
        evidence: "Marcus: 'One dot per chart? In W&B I would get parallel coordinates or a proper comparison view.'"
        recommendation: "For CV experiments, show per-fold metrics as a grouped bar chart or box plot instead of single-point charts."
        affected_personas: ["Marcus Delgado"]

    accessibility_findings: []

    jtbd_alignment:
      supported: true
      gap_description: "Marcus's job was to verify skore's logging conventions. The data was all present (metrics, params, tags, artifacts) but the presentation required more clicks than expected. The expert path was not optimized."
      minimum_path_length: 4
      actual_path_length: 7
      efficiency_ratio: 0.57

    complementarity_notes: |
      skore's artifact richness (HTML analysis, PNGs, CSV, pkl) impressed Marcus. However, the pkl format requires skore to interpret, limiting cross-tool accessibility. The integration logs structured metadata (tags) that MLflow does not leverage for adaptive UI behavior. Marcus would use the REST API rather than the UI for serious review, indicating the UI is not meeting expert needs.

  - session_id: "david_flowA"
    persona: "David Okonkwo"
    flow: "A"
    overall_score: 28
    outcome: "completed_with_difficulty"

    heuristic_scores:
      visibility_of_system_status:
        score: 2
        evidence: "Same empty overview issue as other personas, compounded by keyboard navigation overhead."
      match_system_real_world:
        score: 2
        evidence: "Same GenAI-first layout issue."
      user_control_freedom:
        score: 3
        evidence: "ag-grid table blocks keyboard navigation entirely. Cannot reach run links via Tab. Had to use browser address bar as workaround."
      consistency_standards:
        score: 3
        evidence: "ARIA role='tab' present but ArrowRight does not navigate between tabs — violates WAI-ARIA Authoring Practices."
      error_prevention:
        score: 1
        evidence: "No destructive errors, but the keyboard trap in ag-grid is an implicit error state."
      recognition_over_recall:
        score: 3
        evidence: "Must recall URL patterns to work around keyboard navigation blockers. No skip-nav link."
      flexibility_efficiency:
        score: 4
        evidence: "37 Tab presses to reach experiment link. 165 total Tabs across session. No keyboard shortcuts. ag-grid completely inaccessible."
      aesthetic_minimal:
        score: 1
        evidence: "Visual design not directly relevant to keyboard-only assessment."
      error_recovery:
        score: 2
        evidence: "No recovery path when keyboard navigation is blocked by ag-grid — user must abandon keyboard and use URL."
      help_documentation:
        score: 2
        evidence: "No keyboard shortcut documentation. No accessibility statement."

    findings:
      - id: "F007"
        heuristic: "flexibility_efficiency"
        severity: "critical"
        description: "ag-grid runs table is not keyboard-navigable. Cannot reach run links via Tab. No WAI-ARIA grid pattern implemented."
        evidence: "David: 'I have been Tabbing for 40 presses and cannot reach the run link inside the ag-grid table.'"
        recommendation: "Implement WAI-ARIA grid pattern on ag-grid: Arrow keys for cell navigation, Enter to activate links, Space for checkbox selection. ag-grid has built-in accessibility features that may need to be enabled."
        affected_personas: ["David Okonkwo"]

      - id: "F008"
        heuristic: "flexibility_efficiency"
        severity: "critical"
        description: "No skip-navigation link to bypass sidebar. 37 Tab presses to reach experiment link on landing page."
        evidence: "David: '37 Tab presses to reach the experiment link. That is well above the 15-press threshold I consider acceptable.'"
        recommendation: "Add a skip-nav link as the first focusable element: 'Skip to main content'. This is a WCAG 2.4.1 requirement."
        affected_personas: ["David Okonkwo"]

      - id: "F009"
        heuristic: "consistency_standards"
        severity: "major"
        description: "Tab elements have ARIA role='tab' but ArrowRight/ArrowLeft do not navigate between tabs as per WAI-ARIA tab pattern."
        evidence: "David: 'ArrowRight does NOT move between tabs. Focus stays on Overview.'"
        recommendation: "Implement WAI-ARIA tabs pattern: ArrowRight/ArrowLeft to move between tabs, Tab to move into tab panel content."
        affected_personas: ["David Okonkwo"]

    accessibility_findings:
      - id: "A001"
        wcag_criterion: "2.4.1 Bypass Blocks (Level A)"
        severity: "critical"
        description: "No skip-navigation link. Users must Tab through 37+ elements to reach main content."
        recommendation: "Add 'Skip to main content' link as first focusable element on every page."

      - id: "A002"
        wcag_criterion: "2.1.1 Keyboard (Level A)"
        severity: "critical"
        description: "ag-grid training runs table is not keyboard operable. Run links and checkboxes cannot be reached or activated via keyboard."
        recommendation: "Enable ag-grid's built-in keyboard navigation. Implement WAI-ARIA grid role with Arrow key navigation and Space/Enter activation."

      - id: "A003"
        wcag_criterion: "2.1.1 Keyboard (Level A)"
        severity: "major"
        description: "Tab bar does not support Arrow key navigation between tabs despite having ARIA role='tab'."
        recommendation: "Implement WAI-ARIA tabs keyboard pattern: ArrowRight/Left to switch tabs, Home/End for first/last tab."

      - id: "A004"
        wcag_criterion: "2.4.7 Focus Visible (Level AA)"
        severity: "minor"
        description: "Focus indicators are present on most elements but could be more prominent for high-contrast visibility."
        recommendation: "Ensure focus indicators have a minimum 3:1 contrast ratio and are at least 2px wide."

    jtbd_alignment:
      supported: false
      gap_description: "David could not complete the core task (navigate to a run and inspect metrics) using only the keyboard. The ag-grid blocker forced a URL workaround. The app's mental model assumes mouse interaction for the primary workflow."
      minimum_path_length: 4
      actual_path_length: 6
      efficiency_ratio: 0.67

    complementarity_notes: |
      The MLflow UI is fundamentally inaccessible for keyboard-only users at the runs table level. This blocks David from evaluating skore's logged data through the UI. The skore integration itself logs data correctly, but the MLflow presentation layer creates an accessibility barrier. David would have to use the Python API or REST API instead, defeating the purpose of a visual tracking UI.

